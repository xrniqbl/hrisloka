        {
          "@type": "Question",

          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HRIS Loka adalah platform manajemen SDM (Human Resource Information System) modern yang dirancang khusus untuk perusahaan Indonesia. Platform ini mencakup fitur manajemen karyawan, absensi GPS real-time, penggajian otomatis, rekrutmen & onboarding, penilaian KPI, dan analitik HR dalam satu sistem terintegrasi berbasis cloud."
          }
        },
        {
          "@type": "Question",
          "name": "Berapa biaya berlangganan HRIS Loka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HRIS Loka tersedia dalam tiga paket: (1) Starter — Rp 75.000/bulan untuk hingga 50 karyawan, (2) Pro — Rp 125.000/bulan untuk hingga 200 karyawan dengan fitur lengkap termasuk absensi GPS, penggajian otomatis, KPI, dan rekrutmen, (3) Enterprise — harga custom untuk perusahaan besar. Berlangganan tahunan mendapat diskon 15%."
          }
        },
        {
          "@type": "Question",
          "name": "Apakah HRIS Loka tersedia sebagai aplikasi mobile?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ya, HRIS Loka tersedia sebagai Progressive Web App (PWA) yang dapat diinstal di Android dan iOS langsung dari browser tanpa perlu download di Play Store atau App Store. Karyawan dapat mengakses fitur absensi GPS, slip gaji, pengajuan cuti, KPI, dan lainnya dari smartphone mereka."
          }
        },
        {
          "@type": "Question",
          "name": "Bagaimana keamanan data di HRIS Loka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HRIS Loka menggunakan enkripsi end-to-end, row-level security (RLS), role-based access control (RBAC), multi-tenant data isolation, dan audit log lengkap. Data disimpan di infrastruktur cloud Supabase dengan standar keamanan enterprise. Semua koneksi dilindungi HTTPS dan HSTS."
          }
        },
        {
          "@type": "Question",
          "name": "Apakah HRIS Loka cocok untuk perusahaan kecil (UMKM)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sangat cocok. Paket Starter HRIS Loka mulai Rp 75.000/bulan untuk hingga 50 karyawan, ideal untuk UMKM yang memulai digitalisasi HR. Setup hanya butuh 5 menit tanpa keahlian teknis. Tersedia pula paket Enterprise untuk skala perusahaan besar."
          }
        },
        {
          "@type": "Question",
          "name": "Apakah absensi HRIS Loka bisa digunakan secara offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HRIS Loka mendukung mode offline terbatas melalui PWA (Progressive Web App). Data absensi akan tersinkronisasi secara otomatis ketika koneksi internet kembali tersedia."
          }
        },
        {
          "@type": "Question",
          "name": "Apakah HRIS Loka mendukung perhitungan BPJS dan PPh 21?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ya, modul penggajian HRIS Loka mendukung perhitungan otomatis potongan BPJS Ketenagakerjaan, BPJS Kesehatan, dan PPh 21 sesuai regulasi ketenagakerjaan Indonesia yang berlaku."
          }
        },
        {
          "@type": "Question",
          "name": "Bagaimana cara memulai menggunakan HRIS Loka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cara memulai HRIS Loka sangat mudah: (1) Daftar akun di hrisloka.com/checkout dan pilih paket Starter atau Pro, (2) Setup profil perusahaan dan struktur organisasi, (3) Import data karyawan via Excel atau input manual, (4) Mulai gunakan fitur absensi, cuti, dan penggajian. Seluruh proses bisa selesai dalam waktu kurang dari 5 menit."
          }
        }
      ]
    }
    </script>
